# Example YAML config for vllm_online_bench
# run_online_bench.py reads the 'client' section when --config is provided

# 环境变量配置（在服务端启动前生效）
env:
  ASCEND_RT_VISIBLE_DEVICES: "6,7"
  NPU_VISIBLE_DEVICES: "6,7"

server:
  model: xxx/Qwen3-VL-4B-Instruct
  served-model-name: Qwen3-VL-4B-Instruct
  tensor-parallel-size: 1
  gpu-memory-utilization: 0.8
  max-num-seqs: 40
  max-model-len: 1280
  trust-remote-code: true
  dtype: float16
  port: 9999
  additional-config: '{"ascend_compilation_config": {"fuse_norm_quant": false, "enable_npugraph_ex": false}}'
  compilation-config:
    cudagraph_mode: "FULL_DECODE_ONLY"
    cudagraph_capture_sizes: [1, 4]
    max_cudagraph_capture_size: 4

client:
  - base-url: http://127.0.0.1:9999
    model: Qwen3-VL-4B-Instruct
    tokenizer: xxx/Qwen3-VL-4B-Instruct
    endpoint: chat
    stream: true
    num-prompts: 16
    max-concurrency: 1
    request-rate: 0.0
    input-len: 512
    output-len: 256
    normalize-file-prompts: false
    synthetic-language: zh
    temperature: 0.0
    top-p: 1.0
    top-k:
    seed: 41
    ignore-eos: false
    timeout: 600.0
    include-usage: false

    # Output configuration
    output-dir: ./bench_results_online
    result-filename: ""

    # Metadata
    # run-id: ""
    # case-id: ""
    # tester: ""
    # hardware: Ascend 910B
    # skip-health-check: false
    # skip-list-models: false
    # print-output: false
    # preview-chars: 300

